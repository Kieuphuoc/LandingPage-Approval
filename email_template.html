<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #0052D4, #4364F7, #6FB1FC);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .content {
            padding: 30px;
        }

        .footer {
            background: #f9f9f9;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #777;
        }

        .info-row {
            margin-bottom: 15px;
            border-bottom: 1px dashed #eee;
            padding-bottom: 10px;
        }

        .label {
            font-weight: bold;
            color: #4364F7;
            display: block;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-size: 12px;
        }

        .value {
            font-size: 16px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: #eef2ff;
            color: #4364F7;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1 style="margin:0; font-size: 24px;">Thông báo Liên hệ Mới</h1>
            <p style="margin:5px 0 0 0; opacity: 0.9;">Bạn có một yêu cầu mới từ Landing Page</p>
        </div>
        <div class="content">
            <div class="info-row">
                <span class="label">Chủ đề</span>
                <span class="badge">{{subject}}</span>
            </div>
            <div class="info-row">
                <span class="label">Họ và tên</span>
                <span class="value">{{name}}</span>
            </div>
            <div class="info-row">
                <span class="label">Email</span>
                <span class="value">{{email}}</span>
            </div>
            <div class="info-row">
                <span class="label">Số điện thoại</span>
                <span class="value">{{phone}}</span>
            </div>
            <div class="info-row">
                <span class="label">Công ty</span>
                <span class="value">{{company}}</span>
            </div>
            <div class="info-row" style="border-bottom: none;">
                <span class="label">Nội dung tin nhắn</span>
                <p class="value" style="background: #f5f7fa; padding: 15px; border-radius: 4px;">{{message}}</p>
            </div>
        </div>
        <div class="footer">
            <p>© 2026 Arito Technology Solutions. Hệ thống thông báo tự động.</p>
        </div>
    </div>
</body>

</html>
